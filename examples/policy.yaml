policy_id: workload-prod-mutual-v1
policy_version: "1"
defaults:
  max_evidence_age_seconds: 60
  require_session_binding: true
local_endpoint:
  require_any: [tee]
remote_endpoint:
  require_any: [tee]
  tee:
    permitted_types: [mock]
    debug_disabled: true
    acceptable_tcb_status: [up_to_date, acceptable]
mutual:
  both_sides_attested: true
  bind_to_current_session: true
degraded_mode:
  allowed_subjects: ["dev-*"]
  denied_actions: ["secret_release", "prod_service_access"]

